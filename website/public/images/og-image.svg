  <text x="80" y="376" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="26" fill="rgba(255,255,255,0.6)"><tspan fill="#00C2A0" font-weight="500">Go binary</tspan>. One command, zero setup.</text>

