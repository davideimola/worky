baseURL = "https://worky.davideimola.dev"
title   = "worky"
languageCode = "en-us"

enableRobotsTXT = true
enableGitInfo   = true

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false

[params]
  description = "Build self-contained interactive workshops as a single Go binary"

  [params.navbar]
    displayTitle = true
    displayLogo  = false

  [params.footer]
    displayCopyright = true

  [params.editURL]
    enable = false

[menu]
  [[menu.main]]
    name       = "Docs"
    pageRef    = "/docs"
    weight     = 1
  [[menu.main]]
    name       = "Showcase"
    pageRef    = "/showcase"
    weight     = 2
  [[menu.main]]
    name       = "GitHub"
    url        = "https://github.com/davideimola/worky"
    weight     = 3
    [menu.main.params]
      type = "remote"
