baseURL = "https://worky.davideimola.dev"
title   = "Worky"
languageCode = "en-us"

enableRobotsTXT = true
enableGitInfo   = true

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false

[params]
  description = "Build self-contained interactive workshops that ship as a single Go binary. Embedded docs, progressive chapter locking, live progress tracking — one file, one command."
  title       = "Worky"
  images      = ["/images/og-image.png"]

  [params.search]
    enable = true

  [params.navbar]
    displayTitle = true
    displayLogo  = true
    [params.navbar.logo]
      path   = "images/logo.svg"
      dark   = "images/logo-dark.svg"
      width  = 80
      height = 80

  [params.footer]
    displayCopyright = true

  [params.editURL]
    enable = false

[menu]
  [[menu.main]]
    name       = "Docs"
    pageRef    = "/docs"
    weight     = 1
  [[menu.main]]
    name       = "Showcase"
    pageRef    = "/showcase"
    weight     = 2
  [[menu.main]]
    name       = "Search"
    weight     = 3
    [menu.main.params]
      type = "search"

  [[menu.main]]
    name       = "GitHub"
    url        = "https://github.com/davideimola/worky"
    weight     = 4
    [menu.main.params]
      icon = "github"
