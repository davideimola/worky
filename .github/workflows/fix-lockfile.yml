name: Fix Lockfile

on:
  push:
    branches: [main]
    paths: [website/package.json]

jobs:
  fix:
    name: Regenerate pnpm lockfile
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Regenerate lockfile
        working-directory: website
        run: pnpm install --no-frozen-lockfile

      - name: Commit updated lockfile
        run: |
          if git diff --exit-code website/pnpm-lock.yaml; then
            echo "Lockfile is up to date, nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add website/pnpm-lock.yaml
            git commit -m "chore(deps): regenerate pnpm lockfile"
            git push
          fi
