name: Website

on:
  push:
    branches: [ main ]
    paths: [ website/**, .github/workflows/website.yml ]
  pull_request:
    paths: [ website/**, .github/workflows/website.yml ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Link Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v6

      - name: Debug lockfile after checkout
        run: |
          echo "=== after checkout ==="
          head -3 website/pnpm-lock.yaml
          wc -c website/pnpm-lock.yaml
          grep -c "^---" website/pnpm-lock.yaml || true

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Debug lockfile after pnpm setup
        run: |
          echo "=== after pnpm/action-setup ==="
          head -3 website/pnpm-lock.yaml
          wc -c website/pnpm-lock.yaml
          grep -c "^---" website/pnpm-lock.yaml || true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Debug lockfile after node setup
        run: |
          echo "=== after actions/setup-node ==="
          head -3 website/pnpm-lock.yaml
          wc -c website/pnpm-lock.yaml
          grep -c "^---" website/pnpm-lock.yaml || true

      - name: Install dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress --exclude '^https?://' --root-dir ${{ github.workspace
            }}/website/dist website/dist
          fail: true
