name: Website

on:
  push:
    branches: [ main ]
    paths: [ website/**, .github/workflows/website.yml ]
  pull_request:
    paths: [ website/**, .github/workflows/website.yml ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Link Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v6

      - name: Debug lockfile
        working-directory: ${{ github.workspace }}
        run: |
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('website/pnpm-lock.yaml', 'utf8');
          const bom = content.charCodeAt(0) === 0xFEFF;
          const docSeps = (content.match(/^---/gm) || []).length;
          const docEnds = (content.match(/^\.\.\.$/gm) || []).length;
          console.log('BOM:', bom);
          console.log('--- separators:', docSeps);
          console.log('... end markers:', docEnds);
          console.log('bytes:', Buffer.byteLength(content, 'utf8'));
          console.log('first 80 chars:', JSON.stringify(content.slice(0, 80)));
          "
          pnpm --version

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress --exclude '^https?://' --root-dir ${{ github.workspace
            }}/website/dist website/dist
          fail: true
