name: Website

on:
  push:
    branches: [ main ]
    paths: [ website/**, .github/workflows/website.yml ]
  pull_request:
    paths: [ website/**, .github/workflows/website.yml ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Link Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v6

      - name: Debug lockfile after checkout
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== commit ==="
          git log --oneline -1
          echo "=== git content (first 3 lines) ==="
          git show HEAD:website/pnpm-lock.yaml | head -3
          echo "=== disk content (first 3 lines) ==="
          head -3 website/pnpm-lock.yaml
          echo "=== sizes ==="
          git show HEAD:website/pnpm-lock.yaml | wc -c
          wc -c website/pnpm-lock.yaml
          echo "=== --- count on disk ==="
          grep -c "^---" website/pnpm-lock.yaml || true

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress --exclude '^https?://' --root-dir ${{ github.workspace
            }}/website/dist website/dist
          fail: true
