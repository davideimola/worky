name: Website

on:
  push:
    branches: [ main ]
    paths: [ website/**, .github/workflows/website.yml ]
  pull_request:
    paths: [ website/**, .github/workflows/website.yml ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Link Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Debug environment
        run: |
          pnpm --version
          node --version
          head -3 pnpm-lock.yaml
          wc -c pnpm-lock.yaml
          grep -c "^---" pnpm-lock.yaml || true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress --exclude '^https?://' --root-dir ${{ github.workspace
            }}/website/dist website/dist
          fail: true
